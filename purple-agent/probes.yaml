    command: |
      printf '{"id":1,"jsonrpc":"2.0","method":"login","params":{"login":"41ABC","pass":"x","agent":"XMRig/6.21.0","algo":["rx/0"]}}\n' \
        | timeout 3 nc pool.supportxmr.com 3333 >/dev/null 2>&1

