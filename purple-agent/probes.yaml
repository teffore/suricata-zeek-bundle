  - name: art-knock-port-knock-sequence
    category: evasion
    mitre: T1205.001
    source: atomic-red-team
    art_test: "T1205.001 (community — no ART atomic)"
    rationale: "Port knock sequence — 4 rapid TCP SYNs to closed high ports then SSH"
    expected_sids: []
    expected_verdict: UNDETECTED
    already_in_catalog: false
    command: |
      # Classic 3-4 port knock sequence; no knockd on victim so all SYNs get RST.
      # Signal is the *ordered pattern* of SYNs to closed ports — Zeek custom
      # script territory (existing scan detectors likely won't flag 4 packets).
      knock -v "{{VICTIM_IP}}" 7000 8000 9000 1234 2>&1 | head -5 || true
      # Follow-up SSH attempt — the pattern a real knockd client would produce
      timeout 3 bash -c "echo QUIT | nc -w 2 {{VICTIM_IP}} 22" 2>&1 | head -2 || true
      echo "port knock sequence sent — expect conn.log burst to 7000/8000/9000/1234"
