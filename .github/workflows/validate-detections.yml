# Validates that the sensor actually *detects* attacks — not just that it
# installs. Provisions three ephemeral EC2 instances (attacker, victim,
# sensor) plus a VPC Traffic Mirror session from the victim's primary ENI
# to the sensor's primary ENI (single-ENI design — both management and
# mirror traffic share the one NIC). Runs the Kali-style attack battery
# from testing/run_attacks.sh and gates success on testing/verify_alerts.sh.
#
# Trigger: workflow_dispatch only. Run time ~10 min, cost ~$0.05/run.
#
# Flow:
#   1. OIDC -> assume IAM role (same role as validate-standalone.yml, with
#      extra traffic-mirror + ENI permissions — see .github/AWS_SETUP.md)
#   2. Launch 3x t3.medium Ubuntu 22.04 in the same default subnet (AZ)
#   3. Disable source/dest check on sensor primary ENI; set promisc + MTU 9001
#   4. Install nginx+sshd on victim; install standalone.sh on sensor;
#      install testing/attacker_setup.sh on attacker
#   5. Create traffic-mirror target / filter / session (victim ENI -> sensor
#      primary ENI)
#   6. Smoke-check that VXLAN frames reach the sensor
#   7. Run testing/run_attacks.sh from attacker against victim private IP
#   8. Run testing/verify_alerts.sh on sensor; gate on exit 0
#   9. Upload fast.log, sig-breakdown.txt, zeek logs as artifacts
#  10. Teardown (always): mirror session -> filter -> target -> instances
#      -> SG -> key pair. Reverse of create order.

name: Validate detections (Kali + victim + mirror)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  INSTANCE_TYPE: t3.medium
  # Pinned Kali Linux AMI (us-east-1). Used for the attacker box only;
  # sensor + victim stay on Ubuntu 22.04 because standalone.sh targets that.
  # Bumping is intentional — doing so in a PR makes the version change
  # reviewable and keeps CI reproducible.
  KALI_AMI_ID: ami-003fa928ba1faa587

jobs:
  detect:
    name: Attack + detect on mirrored traffic
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set run context
        id: ctx
        run: |
          RUN_TAG="gha-det-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          MY_IP=$(curl -fsSL https://checkip.amazonaws.com)
          AMI_ID=$(aws ssm get-parameter \
            --name /aws/service/canonical/ubuntu/server/22.04/stable/current/amd64/hvm/ebs-gp2/ami-id \
            --query Parameter.Value --output text)
          echo "run_tag=${RUN_TAG}" >> "$GITHUB_OUTPUT"
          echo "my_ip=${MY_IP}" >> "$GITHUB_OUTPUT"
          echo "ami_id=${AMI_ID}" >> "$GITHUB_OUTPUT"

      - name: Resolve default VPC + subnet
        id: net
        run: |
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters Name=isDefault,Values=true \
            --query 'Vpcs[0].VpcId' --output text)
          SUBNET_ID=$(aws ec2 describe-subnets \
            --filters Name=vpc-id,Values=$VPC_ID Name=default-for-az,Values=true \
            --query 'Subnets[0].SubnetId' --output text)
          echo "vpc_id=${VPC_ID}" >> "$GITHUB_OUTPUT"
          echo "subnet_id=${SUBNET_ID}" >> "$GITHUB_OUTPUT"

      - name: Generate ephemeral SSH key + register pair
        run: |
          ssh-keygen -t ed25519 -f ~/.ssh/gha_id -N '' -q
          chmod 600 ~/.ssh/gha_id
          aws ec2 import-key-pair \
            --key-name "${{ steps.ctx.outputs.run_tag }}" \
            --public-key-material "fileb://$HOME/.ssh/gha_id.pub"

      - name: Create security group
        id: sg
        run: |
          SG_ID=$(aws ec2 create-security-group \
            --group-name "${{ steps.ctx.outputs.run_tag }}" \
            --description "ephemeral GHA detection run" \
            --vpc-id "${{ steps.net.outputs.vpc_id }}" \
            --query GroupId --output text)
          # SSH from runner
          aws ec2 authorize-security-group-ingress \
            --group-id "$SG_ID" --protocol tcp --port 22 \
            --cidr "${{ steps.ctx.outputs.my_ip }}/32"
          # Intra-SG any-to-any so attacker <-> victim flows freely and VXLAN
          # mirror packets (UDP 4789) reach the sensor's secondary ENI.
          aws ec2 authorize-security-group-ingress \
            --group-id "$SG_ID" --protocol -1 --source-group "$SG_ID"
          echo "sg_id=${SG_ID}" >> "$GITHUB_OUTPUT"

      - name: Launch sensor, victim, attacker
        id: ec2
        run: |
          # Second positional arg is the AMI so we can give the attacker Kali
          # while sensor + victim stay Ubuntu. Kali has the full red-team
          # toolchain preinstalled (impacket-scripts, nikto, hydra, etc.)
          # which lets attacker_setup.sh verify instead of install.
          launch() {
            local role="$1" ami="$2"
            aws ec2 run-instances \
              --image-id "$ami" \
              --instance-type "${{ env.INSTANCE_TYPE }}" \
              --key-name "${{ steps.ctx.outputs.run_tag }}" \
              --security-group-ids "${{ steps.sg.outputs.sg_id }}" \
              --subnet-id "${{ steps.net.outputs.subnet_id }}" \
              --associate-public-ip-address \
              --block-device-mappings 'DeviceName=/dev/sda1,Ebs={VolumeSize=20,VolumeType=gp3}' \
              --tag-specifications "ResourceType=instance,Tags=[{Key=Name,Value=${{ steps.ctx.outputs.run_tag }}-${role}},{Key=RunTag,Value=${{ steps.ctx.outputs.run_tag }}},{Key=Role,Value=${role}}]" \
              --query 'Instances[0].InstanceId' --output text
          }
          SENSOR_ID=$(launch sensor   "${{ steps.ctx.outputs.ami_id }}")
          VICTIM_ID=$(launch victim   "${{ steps.ctx.outputs.ami_id }}")
          ATTACKER_ID=$(launch attacker "${{ env.KALI_AMI_ID }}")
          echo "sensor_id=${SENSOR_ID}" >> "$GITHUB_OUTPUT"
          echo "victim_id=${VICTIM_ID}" >> "$GITHUB_OUTPUT"
          echo "attacker_id=${ATTACKER_ID}" >> "$GITHUB_OUTPUT"

      - name: Wait for all instances running
        id: wait
        run: |
          # `aws ec2 wait instance-status-ok` polls the Nitro system + instance
          # reachability flags on a 15-30s cadence and typically sits for 3+ min
          # before flipping. For this pipeline we only need SSH reachability,
          # which is proved directly by the SSH + cloud-init loop below — so
          # skip the reachability wait and short-poll describe-instances just
          # until `running` state (usually <30 s after run-instances).
          for ID in \
            "${{ steps.ec2.outputs.sensor_id }}" \
            "${{ steps.ec2.outputs.victim_id }}" \
            "${{ steps.ec2.outputs.attacker_id }}"; do
            for i in $(seq 1 30); do
              STATE=$(aws ec2 describe-instances --instance-ids "$ID" \
                --query 'Reservations[0].Instances[0].State.Name' --output text)
              [ "$STATE" = "running" ] && break
              sleep 2
            done
            [ "$STATE" = "running" ] || { echo "FAIL: $ID never reached running (last state: $STATE)"; exit 1; }
          done
          ip_of() {
            aws ec2 describe-instances --instance-ids "$1" \
              --query 'Reservations[0].Instances[0].PublicIpAddress' --output text
          }
          private_of() {
            aws ec2 describe-instances --instance-ids "$1" \
              --query 'Reservations[0].Instances[0].PrivateIpAddress' --output text
          }
          primary_eni_of() {
            aws ec2 describe-instances --instance-ids "$1" \
              --query 'Reservations[0].Instances[0].NetworkInterfaces[0].NetworkInterfaceId' --output text
          }
          SENSOR_IP=$(ip_of "${{ steps.ec2.outputs.sensor_id }}")
          VICTIM_IP=$(ip_of "${{ steps.ec2.outputs.victim_id }}")
          ATTACKER_IP=$(ip_of "${{ steps.ec2.outputs.attacker_id }}")
          VICTIM_PRIVATE=$(private_of "${{ steps.ec2.outputs.victim_id }}")
          ATTACKER_PRIVATE=$(private_of "${{ steps.ec2.outputs.attacker_id }}")
          VICTIM_ENI=$(primary_eni_of "${{ steps.ec2.outputs.victim_id }}")
          ATTACKER_ENI=$(primary_eni_of "${{ steps.ec2.outputs.attacker_id }}")
          SENSOR_ENI=$(primary_eni_of "${{ steps.ec2.outputs.sensor_id }}")
          # Source/dest check must be off on the mirror-target ENI so mirrored
          # frames with arbitrary inner IPs aren't dropped by the Nitro NIC.
          aws ec2 modify-network-interface-attribute \
            --network-interface-id "$SENSOR_ENI" --no-source-dest-check
          echo "sensor_ip=${SENSOR_IP}" >> "$GITHUB_OUTPUT"
          echo "victim_ip=${VICTIM_IP}" >> "$GITHUB_OUTPUT"
          echo "attacker_ip=${ATTACKER_IP}" >> "$GITHUB_OUTPUT"
          echo "victim_private=${VICTIM_PRIVATE}" >> "$GITHUB_OUTPUT"
          echo "attacker_private=${ATTACKER_PRIVATE}" >> "$GITHUB_OUTPUT"
          echo "victim_eni=${VICTIM_ENI}" >> "$GITHUB_OUTPUT"
          echo "attacker_eni=${ATTACKER_ENI}" >> "$GITHUB_OUTPUT"
          echo "sensor_eni=${SENSOR_ENI}" >> "$GITHUB_OUTPUT"

      - name: Wait for SSH + cloud-init on all three (parallel)
        run: |
          # Fan out: each box polls SSH readiness, then waits on cloud-init
          # in its own subshell. Wall-clock is now max(boxes) not sum(boxes).
          # Attacker is Kali (default user 'kali'); sensor + victim are Ubuntu.
          # Kali's cloud-init status --wait can return non-zero on a "degraded"
          # finish state even when init actually completed (module warning etc.),
          # so we tolerate its exit code and instead gate on a follow-up SSH
          # that runs after cloud-init says it's done.
          wait_box() {
            local IP="$1" NAME="$2" USER="${3:-ubuntu}"
            local SSH_OPTS="-i ~/.ssh/gha_id -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
            for i in $(seq 1 30); do
              nc -z -w 5 "$IP" 22 && break
              sleep 5
            done
            nc -z -w 5 "$IP" 22 || { echo "[$NAME] SSH never came up on $IP"; return 1; }
            ssh $SSH_OPTS "$USER"@"$IP" "cloud-init status --wait || true" >/dev/null 2>&1
            ssh $SSH_OPTS "$USER"@"$IP" "echo ready" >/dev/null \
              || { echo "[$NAME] post-cloud-init SSH failed"; return 1; }
            echo "[$NAME] ready"
          }
          wait_box "${{ steps.wait.outputs.sensor_ip }}"   sensor   ubuntu &
          SENSOR_PID=$!
          wait_box "${{ steps.wait.outputs.victim_ip }}"   victim   ubuntu &
          VICTIM_PID=$!
          wait_box "${{ steps.wait.outputs.attacker_ip }}" attacker kali &
          ATTACKER_PID=$!
          fail=0
          wait $SENSOR_PID   || fail=1
          wait $VICTIM_PID   || fail=1
          wait $ATTACKER_PID || fail=1
          [ "$fail" = 0 ] || exit 1

      - name: Prepare sensor NIC for mirror reception
        run: |
          # Single-ENI mirror setup: mirror target is the sensor's *primary*
          # ENI (ens5). Source/dest check is already disabled by the prior
          # step. Bring the NIC into promiscuous mode + reassert jumbo MTU
          # so VXLAN frames aren't dropped by hardware MAC filtering or
          # truncated by a small MTU.
          ssh -i ~/.ssh/gha_id -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            ubuntu@${{ steps.wait.outputs.sensor_ip }} '
              set -e
              IF=$(ip -o link show | awk -F": " "{print \$2}" | grep -v lo | head -1)
              sudo ip link set "$IF" promisc on
              sudo ip link set "$IF" mtu 9001
              ip -br link show "$IF"
            '

      - name: Install sensor + victim + attacker (parallel)
        run: |
          # Three install flows on three different boxes — zero dependencies
          # between them, so run concurrently and bound wall-clock by the
          # slowest (sensor, ~3 min for standalone.sh).
          #
          # Each subshell redirects to its own tee'd log so CI can still
          # surface the root cause of any install failure after `wait`.
          SSH_OPTS="-i $HOME/.ssh/gha_id -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          SENSOR_IP="${{ steps.wait.outputs.sensor_ip }}"
          VICTIM_IP="${{ steps.wait.outputs.victim_ip }}"
          ATTACKER_IP="${{ steps.wait.outputs.attacker_ip }}"

          (
            echo "--- SENSOR install ---"
            scp $SSH_OPTS standalone.sh ubuntu@"$SENSOR_IP":/tmp/standalone.sh
            # Let standalone.sh auto-detect the primary NIC (ens5). No --iface
            # flag needed in single-ENI mode.
            ssh $SSH_OPTS ubuntu@"$SENSOR_IP" "sudo bash /tmp/standalone.sh --force"
            ssh $SSH_OPTS ubuntu@"$SENSOR_IP" '
              set -e
              systemctl is-active suricata
              sudo /opt/zeek/bin/zeekctl status
              sudo apt-get install -y -qq tcpdump jq
            '
          ) > /tmp/sensor-install.log 2>&1 &
          SENSOR_PID=$!

          (
            echo "--- VICTIM install ---"
            scp $SSH_OPTS testing/victim_setup.sh ubuntu@"$VICTIM_IP":/tmp/victim_setup.sh
            ssh $SSH_OPTS ubuntu@"$VICTIM_IP" "sudo bash /tmp/victim_setup.sh"
          ) > /tmp/victim-install.log 2>&1 &
          VICTIM_PID=$!

          (
            echo "--- ATTACKER install ---"
            # Attacker runs Kali (user 'kali'); sensor + victim are Ubuntu.
            scp $SSH_OPTS testing/attacker_setup.sh kali@"$ATTACKER_IP":/tmp/attacker_setup.sh
            scp $SSH_OPTS testing/run_attacks.sh   kali@"$ATTACKER_IP":/tmp/run_attacks.sh
            ssh $SSH_OPTS kali@"$ATTACKER_IP" "sudo bash /tmp/attacker_setup.sh && chmod +x /tmp/run_attacks.sh"
          ) > /tmp/attacker-install.log 2>&1 &
          ATTACKER_PID=$!

          fail=0
          wait $SENSOR_PID   || { echo "SENSOR install failed";   fail=1; }
          wait $VICTIM_PID   || { echo "VICTIM install failed";   fail=1; }
          wait $ATTACKER_PID || { echo "ATTACKER install failed"; fail=1; }

          # Always dump logs so success or failure is traceable in CI output.
          echo "::group::sensor-install.log";   cat /tmp/sensor-install.log;   echo "::endgroup::"
          echo "::group::victim-install.log";   cat /tmp/victim-install.log;   echo "::endgroup::"
          echo "::group::attacker-install.log"; cat /tmp/attacker-install.log; echo "::endgroup::"

          [ "$fail" = 0 ] || exit 1

      - name: Verify attacker tools present
        run: |
          # The old kali_setup.sh silently swallowed failures and the attack
          # run would hit 'command not found' for every tool. Hard-fail here
          # if anything the attack battery expects is missing.
          ssh -i ~/.ssh/gha_id -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            kali@${{ steps.wait.outputs.attacker_ip }} '
              set -e
              missing=()
              for t in nmap hydra nikto hping3 dig smbclient impacket-psexec xxd curl; do
                command -v "$t" >/dev/null || missing+=("$t")
              done
              if [ "${#missing[@]}" -gt 0 ]; then
                echo "MISSING: ${missing[*]}"
                exit 1
              fi
              echo "all attacker tools present"
            '

      - name: Create traffic-mirror plumbing
        id: mirror
        run: |
          TGT_ID=$(aws ec2 create-traffic-mirror-target \
            --network-interface-id "${{ steps.wait.outputs.sensor_eni }}" \
            --description "${{ steps.ctx.outputs.run_tag }}-tgt" \
            --tag-specifications "ResourceType=traffic-mirror-target,Tags=[{Key=RunTag,Value=${{ steps.ctx.outputs.run_tag }}}]" \
            --query 'TrafficMirrorTarget.TrafficMirrorTargetId' --output text)
          FILTER_ID=$(aws ec2 create-traffic-mirror-filter \
            --description "${{ steps.ctx.outputs.run_tag }}-flt" \
            --tag-specifications "ResourceType=traffic-mirror-filter,Tags=[{Key=RunTag,Value=${{ steps.ctx.outputs.run_tag }}}]" \
            --query 'TrafficMirrorFilter.TrafficMirrorFilterId' --output text)
          # Allow-all ingress + egress so every packet the victim ENI sees
          # or sends is mirrored to the sensor.
          aws ec2 create-traffic-mirror-filter-rule \
            --traffic-mirror-filter-id "$FILTER_ID" \
            --traffic-direction ingress --rule-number 100 \
            --rule-action accept \
            --destination-cidr-block 0.0.0.0/0 --source-cidr-block 0.0.0.0/0 >/dev/null
          aws ec2 create-traffic-mirror-filter-rule \
            --traffic-mirror-filter-id "$FILTER_ID" \
            --traffic-direction egress --rule-number 100 \
            --rule-action accept \
            --destination-cidr-block 0.0.0.0/0 --source-cidr-block 0.0.0.0/0 >/dev/null
          SESS_ID=$(aws ec2 create-traffic-mirror-session \
            --network-interface-id "${{ steps.wait.outputs.victim_eni }}" \
            --traffic-mirror-target-id "$TGT_ID" \
            --traffic-mirror-filter-id "$FILTER_ID" \
            --session-number 1 --virtual-network-id 1 \
            --description "${{ steps.ctx.outputs.run_tag }}-sess" \
            --tag-specifications "ResourceType=traffic-mirror-session,Tags=[{Key=RunTag,Value=${{ steps.ctx.outputs.run_tag }}}]" \
            --query 'TrafficMirrorSession.TrafficMirrorSessionId' --output text)

          # Second mirror: attacker ENI -> same sensor target, VNI=2.
          # The filter rejects attacker<->victim traffic because session 1
          # already captures it on the victim side; without that reject,
          # every attacker->victim packet would land in Suricata twice
          # (inflated alert counts, doubled flow records).
          FILTER_ATTACKER_ID=$(aws ec2 create-traffic-mirror-filter \
            --description "${{ steps.ctx.outputs.run_tag }}-flt-attacker" \
            --tag-specifications "ResourceType=traffic-mirror-filter,Tags=[{Key=RunTag,Value=${{ steps.ctx.outputs.run_tag }}}]" \
            --query 'TrafficMirrorFilter.TrafficMirrorFilterId' --output text)
          # Lower rule-number = higher priority. Reject-victim evaluated first.
          aws ec2 create-traffic-mirror-filter-rule \
            --traffic-mirror-filter-id "$FILTER_ATTACKER_ID" \
            --traffic-direction egress --rule-number 50 --rule-action reject \
            --source-cidr-block 0.0.0.0/0 \
            --destination-cidr-block "${{ steps.wait.outputs.victim_private }}/32" >/dev/null
          aws ec2 create-traffic-mirror-filter-rule \
            --traffic-mirror-filter-id "$FILTER_ATTACKER_ID" \
            --traffic-direction ingress --rule-number 50 --rule-action reject \
            --destination-cidr-block 0.0.0.0/0 \
            --source-cidr-block "${{ steps.wait.outputs.victim_private }}/32" >/dev/null
          aws ec2 create-traffic-mirror-filter-rule \
            --traffic-mirror-filter-id "$FILTER_ATTACKER_ID" \
            --traffic-direction egress --rule-number 100 --rule-action accept \
            --source-cidr-block 0.0.0.0/0 --destination-cidr-block 0.0.0.0/0 >/dev/null
          aws ec2 create-traffic-mirror-filter-rule \
            --traffic-mirror-filter-id "$FILTER_ATTACKER_ID" \
            --traffic-direction ingress --rule-number 100 --rule-action accept \
            --source-cidr-block 0.0.0.0/0 --destination-cidr-block 0.0.0.0/0 >/dev/null
          SESS_ATTACKER_ID=$(aws ec2 create-traffic-mirror-session \
            --network-interface-id "${{ steps.wait.outputs.attacker_eni }}" \
            --traffic-mirror-target-id "$TGT_ID" \
            --traffic-mirror-filter-id "$FILTER_ATTACKER_ID" \
            --session-number 2 --virtual-network-id 2 \
            --description "${{ steps.ctx.outputs.run_tag }}-sess-attacker" \
            --tag-specifications "ResourceType=traffic-mirror-session,Tags=[{Key=RunTag,Value=${{ steps.ctx.outputs.run_tag }}}]" \
            --query 'TrafficMirrorSession.TrafficMirrorSessionId' --output text)

          echo "tgt_id=${TGT_ID}" >> "$GITHUB_OUTPUT"
          echo "filter_id=${FILTER_ID}" >> "$GITHUB_OUTPUT"
          echo "filter_attacker_id=${FILTER_ATTACKER_ID}" >> "$GITHUB_OUTPUT"
          echo "sess_id=${SESS_ID}" >> "$GITHUB_OUTPUT"
          echo "sess_attacker_id=${SESS_ATTACKER_ID}" >> "$GITHUB_OUTPUT"
          # AWS takes a few seconds to program the mirror — don't race it.
          sleep 15

      - name: Smoke-check mirror (VXLAN frames on sensor primary NIC)
        run: |
          # Generate continuous traffic attacker -> victim for the duration
          # of the capture. `nohup` + detached I/O so sshd doesn't kill the
          # background process when the outer ssh exits.
          ssh -i ~/.ssh/gha_id -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            kali@${{ steps.wait.outputs.attacker_ip }} \
            "nohup bash -c 'for i in \$(seq 1 30); do ping -c 1 ${{ steps.wait.outputs.victim_private }}; curl -fs --max-time 1 http://${{ steps.wait.outputs.victim_private }}/ >/dev/null; sleep 0.5; done' </dev/null >/dev/null 2>&1 &"
          sleep 3
          # Count actual packet lines (timestamped) — do NOT grep for
          # 'VXLAN', tcpdump doesn't print that string without -v. Use
          # -c 10 + exit status: if 10 frames arrive in 15s tcpdump exits
          # 0; if timeout hits first, it exits non-zero.
          set +e
          PKTS=$(ssh -i ~/.ssh/gha_id -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            ubuntu@${{ steps.wait.outputs.sensor_ip }} \
            'IF=$(ip -o link show | awk -F": " "{print \$2}" | grep -v lo | head -1); sudo timeout 15 tcpdump -c 10 -nn -i "$IF" "udp port 4789" 2>&1 | grep -Ec "^[0-9]{2}:[0-9]{2}:[0-9]{2}\."')
          set -e
          echo "VXLAN frames captured in 15s: $PKTS"
          if [ "${PKTS:-0}" -lt 1 ]; then
            echo "FAIL: no VXLAN traffic on sensor primary NIC — mirror session is not delivering"
            echo "--- diagnostic: primary NIC link state ---"
            ssh -i ~/.ssh/gha_id -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              ubuntu@${{ steps.wait.outputs.sensor_ip }} 'IF=$(ip -o link show | awk -F": " "{print \$2}" | grep -v lo | head -1); ip -s link show "$IF"; ethtool -S "$IF" 2>/dev/null | grep -Ei "drop|error" | head' || true
            echo "--- diagnostic: mirror session state ---"
            aws ec2 describe-traffic-mirror-sessions \
              --traffic-mirror-session-ids "${{ steps.mirror.outputs.sess_id }}" \
              --query 'TrafficMirrorSessions[0]' --output json || true
            exit 1
          fi

      - name: Run attack battery
        # 900s hard cap. Exit 124 = timeout; treat as soft-warn so verify_alerts.sh
        # still runs and reports coverage on whatever probes did land. A single
        # hang (smbclient against a silent port is the usual suspect) shouldn't
        # blank an entire run.
        run: |
          set +e
          ssh -i ~/.ssh/gha_id -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            kali@${{ steps.wait.outputs.attacker_ip }} \
            "sudo timeout 900 bash /tmp/run_attacks.sh ${{ steps.wait.outputs.victim_private }}"
          rc=$?
          if [ "$rc" -eq 124 ]; then
            echo "::warning::attack battery hit 900s timeout (exit 124); continuing to verify on partial results"
            exit 0
          fi
          exit "$rc"

      - name: Copy + run verify_alerts.sh on sensor
        id: verify
        run: |
          scp -i ~/.ssh/gha_id -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            testing/verify_alerts.sh ubuntu@${{ steps.wait.outputs.sensor_ip }}:/tmp/verify_alerts.sh
          scp -i ~/.ssh/gha_id -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            testing/probe_catalog.json ubuntu@${{ steps.wait.outputs.sensor_ip }}:/tmp/probe_catalog.json
          ssh -i ~/.ssh/gha_id -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            ubuntu@${{ steps.wait.outputs.sensor_ip }} \
            "sudo bash /tmp/verify_alerts.sh"

      - name: Collect sensor logs for artifact
        if: always() && steps.wait.outputs.sensor_ip != ''
        run: |
          mkdir -p /tmp/sensor-logs
          for f in \
            /tmp/sig-breakdown.txt \
            /tmp/probe-to-sid-coverage.json \
            /var/log/suricata/fast.log \
            /var/log/suricata/suricata.log \
            /var/log/suricata-setup.log; do
            ssh -i ~/.ssh/gha_id -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              ubuntu@${{ steps.wait.outputs.sensor_ip }} "sudo cat $f 2>/dev/null" \
              > "/tmp/sensor-logs/$(basename $f)" || true
          done
          # Trim eve.json — full file can be huge
          ssh -i ~/.ssh/gha_id -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            ubuntu@${{ steps.wait.outputs.sensor_ip }} \
            "sudo head -c 2000000 /var/log/suricata/eve.json" \
            > /tmp/sensor-logs/eve.head.json || true
          # Zeek notices + weird + conn (top of current run)
          for z in notice weird conn dns http ssl; do
            ssh -i ~/.ssh/gha_id -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              ubuntu@${{ steps.wait.outputs.sensor_ip }} \
              "sudo head -c 500000 /opt/zeek/logs/current/${z}.log 2>/dev/null" \
              > "/tmp/sensor-logs/zeek-${z}.log" || true
          done

      - name: Upload detection artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: detection-logs-${{ github.run_id }}
          path: /tmp/sensor-logs/
          if-no-files-found: warn

      - name: Dump failure logs inline
        if: failure() && steps.wait.outputs.sensor_ip != ''
        run: |
          ssh -i ~/.ssh/gha_id -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            ubuntu@${{ steps.wait.outputs.sensor_ip }} '
              echo "=== /var/log/suricata-setup.log (tail) ==="
              sudo tail -200 /var/log/suricata-setup.log 2>/dev/null || true
              echo "=== journalctl -u suricata ==="
              sudo journalctl -u suricata --no-pager -n 100 || true
              echo "=== zeekctl diag ==="
              sudo /opt/zeek/bin/zeekctl diag 2>/dev/null || true
              echo "=== eve.json alert count ==="
              sudo grep -c \"\\\"event_type\\\":\\\"alert\\\"\" /var/log/suricata/eve.json 2>/dev/null || echo 0
            ' || true

      - name: Teardown
        if: always()
        run: |
          # Reverse creation order. Every step `|| true` so one failure
          # does not leak the others.
          if [ -n "${{ steps.mirror.outputs.sess_attacker_id }}" ]; then
            aws ec2 delete-traffic-mirror-session \
              --traffic-mirror-session-id "${{ steps.mirror.outputs.sess_attacker_id }}" 2>/dev/null || true
          fi
          if [ -n "${{ steps.mirror.outputs.sess_id }}" ]; then
            aws ec2 delete-traffic-mirror-session \
              --traffic-mirror-session-id "${{ steps.mirror.outputs.sess_id }}" 2>/dev/null || true
          fi
          if [ -n "${{ steps.mirror.outputs.filter_attacker_id }}" ]; then
            aws ec2 delete-traffic-mirror-filter \
              --traffic-mirror-filter-id "${{ steps.mirror.outputs.filter_attacker_id }}" 2>/dev/null || true
          fi
          if [ -n "${{ steps.mirror.outputs.filter_id }}" ]; then
            aws ec2 delete-traffic-mirror-filter \
              --traffic-mirror-filter-id "${{ steps.mirror.outputs.filter_id }}" 2>/dev/null || true
          fi
          if [ -n "${{ steps.mirror.outputs.tgt_id }}" ]; then
            aws ec2 delete-traffic-mirror-target \
              --traffic-mirror-target-id "${{ steps.mirror.outputs.tgt_id }}" 2>/dev/null || true
          fi
          # Single-ENI mode: no secondary ENI to detach/delete. The sensor's
          # primary ENI is cleaned up when the instance terminates.
          for ID in \
            "${{ steps.ec2.outputs.sensor_id }}" \
            "${{ steps.ec2.outputs.victim_id }}" \
            "${{ steps.ec2.outputs.attacker_id }}"; do
            [ -n "$ID" ] && aws ec2 terminate-instances --instance-ids "$ID" >/dev/null 2>&1 || true
          done
          for ID in \
            "${{ steps.ec2.outputs.sensor_id }}" \
            "${{ steps.ec2.outputs.victim_id }}" \
            "${{ steps.ec2.outputs.attacker_id }}"; do
            [ -n "$ID" ] && aws ec2 wait instance-terminated --instance-ids "$ID" 2>/dev/null || true
          done
          if [ -n "${{ steps.sg.outputs.sg_id }}" ]; then
            aws ec2 delete-security-group \
              --group-id "${{ steps.sg.outputs.sg_id }}" 2>/dev/null || true
          fi
          aws ec2 delete-key-pair \
            --key-name "${{ steps.ctx.outputs.run_tag }}" 2>/dev/null || true
