  - name: art-tor-bootstrap
    mitre: T1090.003
    source: atomic-red-team
    art_test: "T1090.003 #3"
    rationale: "Tor client bootstrap -- directory-authority TLS, ET TOR reputation hits"
    target:
      # Tor bootstrap reaches a small pool of hardcoded directory authorities.
      # Using `sni` with a torproject.org substring attributes the handshake
      # events in ssl.log (moria1.torproject.org etc.); Suricata IP-based ET
      # TOR rules that fire on DA dest_ips without SNI context may miss
      # attribution under the current (SNI/exact-IP) model -- a known limitation
      # worth tracking as a future attribution-model enhancement.
      type: sni
      value: "torproject.org"
    expected_sids: [2400004, 2520110, 2522110, 2522306, 2522710]
    expected_zeek_notices: []
    expected_verdict: DETECTED_EXPECTED
    timeout: 25
    command: |
      TORDIR=$(sudo mktemp -d /tmp/art-tor-XXXXXX)
      timeout 15 sudo tor --DataDirectory "$TORDIR" --SocksPort 9051 --Log 'notice stderr' 2>&1 | head -15 || true
      sudo rm -rf "$TORDIR" 2>/dev/null || true
      echo "tor bootstrap completed -- expect ET TOR on DA IPs"

