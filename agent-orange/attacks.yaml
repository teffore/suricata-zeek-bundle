# attacks.yaml -- Agent Orange atomic red team catalog.
#
# This file contains ONLY atomic-red-team attacks, with a strict schema:
#
#   name                  -- unique identifier (required, snake-case w/ art- prefix)
#   mitre                 -- primary MITRE ATT&CK technique (required)
#   source                -- always "atomic-red-team" (required)
#   art_test              -- provenance string mapping to ART atomic (required)
#   rationale             -- one-line why-this-attack (required)
#   target                -- attribution anchor (required; see below)
#     type: victim | sni | external
#     value: "{{VICTIM_IP}}" | SNI string | external IP/host
#   expected_sids         -- Suricata SIDs expected to fire. Empty list means
#                            "this attack is expected UNDETECTED by the current
#                            rule stack." Do not put ambient canaries here
#                            (9000003, 2001219) unless the attack IS a scan-type
#                            technique where the canary IS the intended signal.
#   expected_zeek_notices -- Zeek notice types expected. Empty list = none.
#   expected_verdict      -- DETECTED_EXPECTED | UNDETECTED (no other values).
#                            DETECTED_PARTIAL is a RUN outcome, not an
#                            expectation, so it's not valid here.
#   timeout               -- optional, seconds. Default 45. Hard ceiling; the
#                            attack command should have its own `timeout N ...`
#                            that's <= this value.
#   command               -- bash to run on the ATTACKER (Kali). {{VICTIM_IP}}
#                            is substituted at run time with the lab's private
#                            VPC address of the victim.
#
# ============================================================================
# Authoring state of `expected_sids` (as of 2026-04-24):
#
# Most entries currently have `expected_sids: []` — this is a known authoring
# gap, not an accident. Empty means one of four things:
#
#   1. MIRROR GAP: attack runs attacker -> internet (not -> victim) and the
#      VPC span port only captures victim-side traffic. The 6 SNI-cluster
#      attacks (cloudflared, devtunnels, vscode-tunnel, rclone-s3, tor,
#      remote-access-sni) are all in this bucket. Re-authoring won't help
#      until the mirror captures attacker egress. expected_verdict: UNDETECTED.
#   2. RULE NOT YET AUTHORED: the technique is detectable but no rule in the
#      current stack targets it (custom rsync banner, whois-as-tunnel payload,
#      icmpdoor sustained ICMP C2, reverse-shell heuristics). Ship a rule
#      then upgrade this entry.
#   3. RULE PRESENT BUT SILENT: an ET/custom rule that SHOULD match this
#      technique is loaded but didn't fire. Needs investigation before
#      upgrade (ET MALWARE HttpBrowser vs. malicious-ua-fanout, ET POLICY
#      Slowloris vs. slowhttptest).
#   4. ATTACKER-SIDE TOOL FAILURE: the attack's shell wrapper swallows the
#      tool failure (`|| true` / `| head`). With runner.detect_failure_marker
#      in place these now classify as FAILED rather than UNDETECTED.
#
# Populated entries (2 as of 2026-04-24): art-masscan-syn-burst,
# art-snmp-community-brute, art-tor-bootstrap (tor's are authored but
# currently blocked by the mirror-direction gap category 1).
# ============================================================================

